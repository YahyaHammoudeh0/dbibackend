name: Build macOS app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libusb
        run: brew install libusb

      - name: Install Python deps
        run: pip install pyusb==1.1.0 pyinstaller

      - name: Build app
        run: pyinstaller DBIBackend.spec --noconfirm --clean

      - name: Zip app
        run: ditto -c -k --keepParent "dist/DBI Backend.app" "DBI-Backend-macOS-arm64.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DBI-Backend-macOS-arm64
          path: DBI-Backend-macOS-arm64.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DBI-Backend-macOS-arm64.zip
